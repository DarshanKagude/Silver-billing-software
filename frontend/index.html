
<!DOCTYPE html>
<html lang="en-IN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#c9a84c" />
  <meta name="description" content="Silver Jewellery Billing Software — Premium, offline-first billing for jewellery shops" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="SilverBill" />
  <link rel="apple-touch-icon" href="./icons/icon-192.png" />

  <title>BDJ Silver Jewellery Billing</title>

  <link rel="shortcut icon" href="./icons/icon-192.png" type="image/png" />
  <link rel="manifest" href="./manifest.json" />
  <link rel="stylesheet" href="./css/styles.css" />

  <!-- Preconnect to Google Fonts for faster load -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
</head>
<body>
  <!-- Sidebar Navigation -->
  <nav id="sidebar" role="navigation" aria-label="Main navigation"></nav>

  <!-- Main App Container (SPA) -->
  <main id="app" role="main" aria-live="polite"></main>

  <!-- Toast Notifications -->
  <div id="toast-container" role="status" aria-live="polite"></div>

  <!-- Splash / Loading Screen -->
  <div id="splash" style="
    position:fixed; inset:0; z-index:9000;
    background: #080808;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:20px;
  ">
    <div style="
      width:72px; height:72px;
      background: linear-gradient(135deg, #c0c0c0, #e5e4e2);
      border-radius:20px;
      display:flex; align-items:center; justify-content:center;
      font-family:'Cinzel',serif; font-size:36px; font-weight:700;
      color:#080808;
      box-shadow: 0 0 40px rgba(192,192,192,0.35);
    ">S</div>
    <div style="font-family:'Cinzel',serif; font-size:18px; color:#c0c0c0; letter-spacing:0.1em;">
      Silver Billing
    </div>
    <div style="
      width:40px; height:40px;
      border:2px solid rgba(192,192,192,0.2);
      border-top-color:#c0c0c0;
      border-radius:50%;
      animation: spin 0.7s linear infinite;
    "></div>
    <style>@keyframes spin { to { transform:rotate(360deg); } }</style>
  </div>

  <!-- App entry point — ES module -->
  <script type="module" src="./js/app.js"></script>

  <!-- Service Worker Registration -->
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./service-worker.js")
          .then((reg) => console.log("SW Registered:", reg.scope))
          .catch((err) => console.log("SW Register Failed:", err));
      });
    }
  </script>

  <!-- Hide splash once DOM & first route renders -->
  <script type="module">
    window.addEventListener("DOMContentLoaded", () => {
      // Small delay so first page renders before hiding splash
      setTimeout(() => {
        const splash = document.getElementById("splash");
        if (splash) {
          splash.style.transition = "opacity 0.4s";
          splash.style.opacity = "0";
          setTimeout(() => splash.remove(), 450);
        }
      }, 600);
    });
  </script>

  <!-- Fallback: if JS modules not supported show message -->
  <noscript>
    <div style="padding:40px; text-align:center; color:#c9a84c; font-family:sans-serif; background:#080808; min-height:100vh;">
      <h2>JavaScript Required</h2>
      <p>Please enable JavaScript to use the Silver Jewellery Billing app.</p>
    </div>
  </noscript>
</body>
</html>
