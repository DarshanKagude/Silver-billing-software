<!DOCTYPE html>
<html lang="en-IN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#c9a84c" />
  <meta name="description" content="Silver Jewellery Billing Software — Premium, offline-first billing for jewellery shops" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="SilverBill" />
  <link rel="apple-touch-icon" href="./icons/icon-192.png" />

  <title>BDJ Silver Jewellery Billing</title>

  <link rel="shortcut icon" href="./icons/icon-192.png" type="image/png" />
  <link rel="manifest" href="./manifest.json" />

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <style>
    /* ── Reset ─────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; height: 100%; }
    body {
      font-family: 'Inter', sans-serif;
      background: #080808;
      color: #f0e6d3;
      min-height: 100vh;
      display: flex;
      overflow-x: hidden;
      line-height: 1.5;
    }

    /* ── Scrollbar ──────────────────────────────────── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #111111; }
    ::-webkit-scrollbar-thumb { background: #a9a9a9; border-radius: 3px; }

    /* ── Utility ────────────────────────────────────── */
    .hidden { display: none !important; }

    /* ── Keyframes (cannot be inlined) ─────────────── */
    @keyframes spin    { to { transform: rotate(360deg); } }
    @keyframes pulse   { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    @keyframes slideUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeOut { from { opacity: 1; } to { opacity: 0; transform: translateY(-4px); } }
    @keyframes fadeIn  { from { opacity: 0; } to { opacity: 1; } }
    @keyframes scaleIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }

    /* ── Input interactions ─────────────────────────── */
    input:hover, textarea:hover, select:hover {
      border-color: rgba(201,168,76,0.45) !important;
      background: rgba(255,255,255,0.055) !important;
    }
    input:focus, textarea:focus, select:focus {
      border-color: rgba(201,168,76,0.75) !important;
      background: rgba(201,168,76,0.06) !important;
      box-shadow: 0 0 0 3px rgba(201,168,76,0.1) !important;
      outline: none;
    }
    input::placeholder, textarea::placeholder { color: #5a5040; }
    select option { background: #1a1a1a; color: #f0e6d3; }

    /* ── Hover states ───────────────────────────────── */
    .nav-item:hover      { background: rgba(201,168,76,0.08) !important; color: #e5e4e2 !important; }
    .stat-card:hover     { border-color: rgba(201,168,76,0.45) !important; box-shadow: 0 0 20px rgba(201,168,76,0.15) !important; transform: translateY(-2px); }
    .data-table tbody tr:hover { background: rgba(201,168,76,0.05) !important; }
    .delete-row-btn:hover { color: #e05c5c !important; background: rgba(224,92,92,0.1) !important; }

    /* ── Responsive sidebar ─────────────────────────── */
    @media (max-width: 600px) {
      #sidebar {
        width: 100% !important;
        height: 60px !important;
        flex-direction: row !important;
        top: auto !important; bottom: 0 !important; left: 0 !important; right: 0 !important;
        border-right: none !important;
        border-top: 1px solid rgba(201,168,76,0.18) !important;
        padding: 0 8px !important;
        justify-content: space-around !important;
      }
      .sidebar-logo { display: none !important; }
      #app { margin-left: 0 !important; padding-bottom: 64px !important; }
    }

    /* ── Print ──────────────────────────────────────── */
    @media print {
      #sidebar, .no-print { display: none !important; }
      #app { margin-left: 0 !important; }
      body { background: white !important; color: #111 !important; }
    }
  </style>
</head>
<body>

  <!-- Sidebar Navigation -->
  <nav id="sidebar" role="navigation" aria-label="Main navigation" style="
    width: 72px;
    background: #111111;
    border-right: 1px solid rgba(201,168,76,0.18);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px 0;
    position: fixed;
    top: 0; left: 0; bottom: 0;
    z-index: 100;
    gap: 8px;
  "></nav>

  <!-- Main App Container (SPA) -->
  <main id="app" role="main" aria-live="polite" style="
    margin-left: 72px;
    flex: 1;
    min-height: 100vh;
    overflow-y: auto;
  "></main>

  <!-- Toast Notifications -->
  <div id="toast-container" role="status" aria-live="polite" style="
    position: fixed;
    bottom: 24px;
    right: 24px;
    z-index: 9999;
    display: flex;
    flex-direction: column;
    gap: 8px;
    pointer-events: none;
  "></div>

  <!-- Splash / Loading Screen -->
  <div id="splash" style="
    position:fixed; inset:0; z-index:9000;
    background:#080808;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:20px;
  ">
    <div style="
      width:72px; height:72px;
      background:linear-gradient(135deg,#c0c0c0,#e5e4e2);
      border-radius:20px;
      display:flex; align-items:center; justify-content:center;
      font-family:'Cinzel',serif; font-size:36px; font-weight:700;
      color:#080808;
      box-shadow:0 0 40px rgba(192,192,192,0.35);
    ">S</div>
    <div style="font-family:'Cinzel',serif; font-size:18px; color:#c0c0c0; letter-spacing:0.1em;">
      Silver Billing
    </div>
    <div style="
      width:40px; height:40px;
      border:2px solid rgba(192,192,192,0.2);
      border-top-color:#c0c0c0;
      border-radius:50%;
      animation:spin 0.7s linear infinite;
    "></div>
  </div>

  <!-- App entry point -->
  <script src="./app.js"></script>

  <!-- Service Worker Registration -->
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./service-worker.js")
          .then(reg => console.log("SW Registered:", reg.scope))
          .catch(err => console.log("SW Register Failed:", err));
      });
    }
  </script>

  <!-- Hide splash -->
  <script type="module">
    window.addEventListener("DOMContentLoaded", () => {
      setTimeout(() => {
        const splash = document.getElementById("splash");
        if (splash) {
          splash.style.transition = "opacity 0.4s";
          splash.style.opacity = "0";
          setTimeout(() => splash.remove(), 450);
        }
      }, 600);
    });
  </script>

  <!-- Fallback -->
  <noscript>
    <div style="padding:40px; text-align:center; color:#c9a84c; font-family:sans-serif; background:#080808; min-height:100vh;">
      <h2>JavaScript Required</h2>
      <p>Please enable JavaScript to use the Silver Jewellery Billing app.</p>
    </div>
  </noscript>

</body>
</html>
